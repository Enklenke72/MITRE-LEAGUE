<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Planteles - Mitre League</title>
    <link rel="stylesheet" href="estilo.css">
    <link rel="shortcut icon" href="./Recursos/logonormal 200x200.png" type="image/png">
    <style>
        .admin-box {
            background-color: #0b205d;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 0px 20px rgba(37, 33, 131, 0.4);
            border: 1px dashed #15285e;
            width: 100%;
            max-width: 600px;
            margin-top: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 15px;
            text-align: left;
        }
        .form-group label {
            color: #60a5fa;
            font-size: 11px;
            text-transform: uppercase;
        }
        .form-group input, .form-group select {
            background-color: #051030;
            border: 1px solid #1e3a8a;
            border-radius: 6px;
            padding: 10px;
            color: white;
            font-family: 'Audiowide', sans-serif;
            outline: none;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 13px;
        }
        th {
            background-color: #1e3a8a;
            color: #5ce1e6;
            padding: 8px;
            text-align: left;
        }
        td {
            padding: 8px;
            border-bottom: 1px solid #15285e;
        }
    </style>
</head>
<body style="background-color: #051030; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; padding: 20px; font-family: 'Audiowide', sans-serif; color: white;">

    <header style="text-align: center; margin-bottom: 10px;">
        <h1 style="font-family: 'Michroma', sans-serif; font-size: 20px; color: #5ce1e6;">MITRE LEAGUE</h1>
        <p style="color: #8fa3d9; font-size: 13px; margin-top: 5px;">Configuración de Listas de Buena Fe</p>
    </header>

    <main class="admin-box" style="border-color: #a855f7;">
        <h2 style="font-size: 13px; color: #a855f7; margin-bottom: 15px; text-transform: uppercase; text-align: center;">🏆 Registrar Nuevo Equipo</h2>
        <form id="form-nuevo-equipo">
            <div class="form-row">
                <div class="form-group">
                    <label>Nombre del Curso</label>
                    <input type="text" id="nuevo-equipo-nombre" placeholder="Ej: 4to 1ra" required>
                </div>
                <div class="form-group">
                    <label>Ciclo</label>
                    <select id="nuevo-equipo-ciclo" required>
                        <option value="superior">Superior</option>
                        <option value="basico">Básico</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Grupo Inicial (Para Apertura) / Poné "Unico" para el Clausura</label>
                <select id="nuevo-equipo-grupo" required>
                    <option value="A">Grupo A</option>
                    <option value="B">Grupo B</option>
                    <option value="C">Grupo C</option>
                    <option value="D">Grupo D</option>
                    <option value="E">Grupo E</option>
                    <option value="Unico">Tabla Única (Clausura)</option>
                </select>
            </div>
            <button type="submit" class="tab-btn" style="width: 100%; height: 38px; margin-top: 5px; font-size: 12px; background-color: #6b21a8; border-color: #a855f7;">
                💾 Guardar Equipo en el Torneo
            </button>
        </form>
    </main>

    <section class="admin-box">
        <h2 style="font-size: 13px; color: #60a5fa; margin-bottom: 12px; text-transform: uppercase; text-align: center;">⚙️ Seleccionar Equipo para Cargar Jugadores</h2>
        <div class="form-row">
            <div class="form-group">
                <label>Filtrar por Ciclo</label>
                <select id="plantel-ciclo">
                    <option value="superior">Superior</option>
                    <option value="basico">Básico</option>
                </select>
            </div>
            <div class="form-group">
                <label>Equipo</label>
                <select id="plantel-equipo-select">
                    </select>
            </div>
        </div>
    </section>

    <section class="admin-box" style="border-color: #5ce1e6;">
        <h2 style="font-size: 13px; color: #5ce1e6; margin-bottom: 15px; text-transform: uppercase; text-align: center;">👤 Añadir Jugador al Plantel</h2>
        <form id="form-jugador">
            <div class="form-group">
                <label>Nombre y Apellido Completo</label>
                <input type="text" id="jugador-nombre" placeholder="Ej: Santino Gaitan" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>DNI</label>
                    <input type="text" id="jugador-dni" placeholder="Ej: 51.125.891" required>
                </div>
                <div class="form-group">
                    <label>Número de Camiseta (Dorsal)</label>
                    <input type="number" id="jugador-dorsal" min="1" max="99" placeholder="4" required>
                </div>
            </div>
            <div class="form-group">
                <label>Usuario de Instagram (Sin @)</label>
                <input type="text" id="jugador-instagram" placeholder="Ej: santigaitan_">
            </div>
            <button type="submit" class="tab-btn active" style="width: 100%; height: 40px; margin-top: 5px; font-size: 13px;">
                ➕ Agregar Jugador
            </button>
        </form>
    </section>

    <div style="width: 100%; max-width: 600px; margin-top: 25px;">
        <h3 id="titulo-lista-plantel" style="font-family:'Michroma', sans-serif; font-size:12px; color:#60a5fa; margin-bottom:10px; text-align:center;">Lista de Buena Fe</h3>
        <div style="background-color: rgba(255,255,255,0.02); padding: 15px; border-radius: 10px; border: 1px solid #1e3a8a;">
            <table>
                <thead>
                    <tr>
                        <th>N°</th>
                        <th>Jugador</th>
                        <th>DNI</th>
                        <th>Instagram</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tabla-jugadores-body">
                    </tbody>
            </table>
        </div>
    </div>

    <div style="margin-top: 30px; display: flex; gap: 20px;">
        <a href="admin.html" style="color: #8fa3d9; text-decoration: none; font-size: 12px; border-bottom: 1px solid #1e3a8a; padding-bottom: 2px;">
            ← Ir a Carga de Partidos
        </a>
        <a href="index.html" style="color: #8fa3d9; text-decoration: none; font-size: 12px; border-bottom: 1px solid #1e3a8a; padding-bottom: 2px;">
            Volver al Dashboard Público →
        </a>
    </div>

    <script src="JAVASCRIPT/data.js"></script>
    <script src="JAVASCRIPT/admin-planteles.js"></script>
</body>
</html>
